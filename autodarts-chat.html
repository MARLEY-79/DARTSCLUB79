<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darts Chat - Autodarts Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e63946;--green:#34d47b;--blue:#457bf7;--purple:#a67cf7;--gold:#f5c518;
  --bg:#080c14;--surface:#0f1623;--card:#141d2e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8edf5;--muted:#6b7a94;--dim:#3a4560;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;overflow:hidden}
body::before{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}
.glow{position:fixed;border-radius:50%;filter:blur(90px);opacity:0.13;pointer-events:none;z-index:0}
.glow-1{width:500px;height:500px;background:var(--red);top:-150px;right:-100px}
.glow-2{width:400px;height:400px;background:var(--blue);bottom:-150px;left:-100px}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;max-width:1100px;margin:0 auto}

/* LOBBY */
#screen-lobby{display:flex;align-items:center;justify-content:center;flex:1;padding:2rem}
.lobby-box{width:100%;max-width:520px;background:var(--card);border:1px solid var(--border2);border-radius:22px;padding:2.5rem 2rem 2rem;box-shadow:0 32px 80px rgba(0,0,0,0.5);animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
.logo-icon{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,var(--red),#c0202d);display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 8px 24px rgba(230,57,70,0.4);flex-shrink:0}
.logo-title{font-family:"Bebas Neue",sans-serif;font-size:1.7rem;letter-spacing:2px;line-height:1}
.logo-sub{font-size:0.6rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.section-lbl{font-size:0.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:0.55rem}
.field{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:10px;padding:.7rem 1rem;font-family:"DM Sans",sans-serif;font-size:.88rem;color:var(--text);width:100%;outline:none;transition:border-color .15s}
.field:focus{border-color:var(--red)}
.field::placeholder{color:var(--dim)}
.divider{display:flex;align-items:center;gap:10px;margin:1.3rem 0;font-size:.63rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:.72rem 1.4rem;border-radius:10px;border:none;font-family:"DM Sans",sans-serif;font-size:.87rem;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,var(--red),#c0202d);color:#fff;width:100%;box-shadow:0 6px 20px rgba(230,57,70,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(230,57,70,.45)}
.btn-secondary{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border2);width:100%}
.btn-secondary:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn-icon{width:36px;height:36px;padding:0;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--muted);flex-shrink:0}
.btn-icon:hover{background:rgba(255,255,255,.12);color:var(--text)}
.mt{margin-top:.8rem}
.mt-sm{margin-top:.45rem}
.row{display:flex;gap:.5rem}
#lobby-error{display:none;color:var(--red);font-size:.74rem;text-align:center;margin-top:.8rem}

/* CHAT SCREEN */
#screen-chat{display:none;flex-direction:column;height:100vh}
.chat-header{display:flex;align-items:center;gap:12px;padding:.85rem 1.2rem;background:rgba(0,0,0,.3);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);flex-shrink:0}
.room-name{font-family:"Bebas Neue",sans-serif;font-size:1.25rem;letter-spacing:1.5px;line-height:1;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.room-meta{font-size:.62rem;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:2px}
.odot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pdot 2s infinite;flex-shrink:0}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.4}}
.ad-link{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:600;color:var(--blue);background:rgba(69,123,247,.1);border:1px solid rgba(69,123,247,.25);border-radius:8px;padding:5px 10px;text-decoration:none;transition:all .15s;flex-shrink:0}
.ad-link:hover{background:rgba(69,123,247,.2)}
.chat-body{display:flex;flex:1;min-height:0}

/* Sidebar */
.sidebar{width:215px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(0,0,0,.15);overflow:hidden}
@media(max-width:600px){.sidebar{display:none}}
.sb-section{padding:.85rem .9rem .45rem;font-size:.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.member-list{flex:1;overflow-y:auto;padding:0 .5rem .8rem}
.member-item{display:flex;align-items:center;gap:8px;padding:.45rem .6rem;border-radius:8px;transition:background .12s}
.member-item:hover{background:rgba(255,255,255,.04)}
.mavatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.mname{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.myou{font-size:.58rem;color:var(--muted)}
.sb-share{padding:.7rem;border-top:1px solid var(--border)}
.qr-wrap{background:#fff;border-radius:8px;padding:7px;display:flex;align-items:center;justify-content:center;margin-bottom:.55rem}
.link-row{display:flex;gap:4px}
.link-input{flex:1;min-width:0;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;padding:.38rem .55rem;font-size:.63rem;color:#8a9ab5;font-family:"DM Mono",monospace;outline:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Messages */
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0}
.msgs{flex:1;overflow-y:auto;padding:1rem 1.2rem;display:flex;flex-direction:column;gap:2px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg-group{display:flex;gap:10px;padding:3px 0}
.msg-group.mine{flex-direction:row-reverse}
.mavt{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:700;flex-shrink:0;align-self:flex-end}
.msg-content{max-width:68%;display:flex;flex-direction:column;gap:2px}
.msg-group.mine .msg-content{align-items:flex-end}
.msg-nick{font-size:.63rem;font-weight:600;color:var(--muted);padding:0 4px;margin-bottom:1px}
.bubble{display:inline-block;background:var(--card);border:1px solid var(--border);border-radius:14px 14px 14px 4px;padding:.5rem .85rem;font-size:.88rem;line-height:1.45;word-break:break-word}
.msg-group.mine .bubble{background:linear-gradient(135deg,var(--red),#c0202d);border-color:transparent;border-radius:14px 14px 4px 14px;color:#fff}
.msg-time{font-size:.57rem;color:var(--dim);padding:0 4px}
.msg-sys{text-align:center;padding:.45rem 0;font-size:.67rem;color:var(--dim);display:flex;align-items:center;justify-content:center;gap:8px}
.msg-sys::before,.msg-sys::after{content:"";flex:1;height:1px;background:var(--border);max-width:80px}
.msg-event{display:flex;justify-content:center;padding:.35rem 0}
.event-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;border-radius:20px;font-size:.74rem;font-weight:700;border:1px solid}
.e180{background:rgba(245,197,24,.1);color:var(--gold);border-color:rgba(245,197,24,.3)}
.ebust{background:rgba(230,57,70,.1);color:var(--red);border-color:rgba(230,57,70,.3)}
.ewin{background:rgba(52,212,123,.1);color:var(--green);border-color:rgba(52,212,123,.3)}
.egame{background:rgba(69,123,247,.1);color:var(--blue);border-color:rgba(69,123,247,.3)}

/* Input bar */
.chat-input-bar{padding:.75rem 1rem;border-top:1px solid var(--border);background:rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;flex-shrink:0}
.chat-field{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:12px;padding:.62rem 1rem;font-family:"DM Sans",sans-serif;font-size:.9rem;color:var(--text);outline:none;transition:border-color .15s}
.chat-field:focus{border-color:var(--red)}
.chat-field::placeholder{color:var(--dim)}
.btn-send{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--red),#c0202d);border:none;color:#fff;font-size:1rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(230,57,70,.4);flex-shrink:0}
.btn-send:hover{transform:scale(1.08)}
.btn-send:active{transform:scale(.96)}
.quick-bar{display:flex;gap:4px;padding:0 1rem .45rem;flex-shrink:0;flex-wrap:wrap}
.qbtn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);font-size:.68rem;font-weight:600;cursor:pointer;transition:all .12s;font-family:"DM Sans",sans-serif}
.qbtn:hover{border-color:var(--border2);color:var(--text);background:rgba(255,255,255,.08)}
.qbtn.gold{border-color:rgba(245,197,24,.3);color:var(--gold);background:rgba(245,197,24,.06)}
.qbtn.grn{border-color:rgba(52,212,123,.3);color:var(--green);background:rgba(52,212,123,.06)}
.qbtn.red{border-color:rgba(230,57,70,.3);color:var(--red);background:rgba(230,57,70,.06)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:1.8rem 1.6rem;width:90%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.6);animation:fadeUp .25s ease}
.modal-title{font-family:"Bebas Neue",sans-serif;font-size:1.4rem;letter-spacing:2px;margin-bottom:.3rem}
.modal-sub{font-size:.73rem;color:var(--muted);margin-bottom:1.1rem}
.code-display{font-family:"Bebas Neue",sans-serif;font-size:2.8rem;letter-spacing:6px;color:var(--red);text-align:center;margin:.5rem 0 1rem}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:.6rem 1.2rem;font-size:.82rem;color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,.4);z-index:200;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div id="app">

<!-- LOBBY -->
<div id="screen-lobby">
  <div class="lobby-box">
    <div class="logo">
      <div class="logo-icon">&#127919;</div>
      <div>
        <div class="logo-title">Darts Chat</div>
        <div class="logo-sub">Conversations Autodarts Club</div>
      </div>
    </div>

    <div class="section-lbl">Creer un salon</div>
    <input class="field" id="room-name" placeholder="Nom du salon (ex: Soiree Club 12/03)" maxlength="40">
    <input class="field mt-sm" id="autodarts-url" placeholder="Lien lobby autodarts.io (optionnel)">
    <input class="field mt-sm" id="create-pseudo" placeholder="Votre pseudo" maxlength="20">
    <button class="btn btn-primary mt" onclick="createRoom()">
      <i class="fas fa-plus-circle"></i> Creer le salon
    </button>

    <div class="divider">ou rejoindre</div>

    <div class="section-lbl">Code du salon</div>
    <div class="row">
      <input class="field" id="join-code" placeholder="Ex: XKZQ47" maxlength="8" style="text-transform:uppercase;font-family:DM Mono,monospace;letter-spacing:2px;flex:1">
      <input class="field" id="join-pseudo" placeholder="Pseudo" maxlength="20" style="flex:1">
    </div>
    <button class="btn btn-secondary mt" onclick="joinRoom()">
      <i class="fas fa-arrow-right-to-bracket"></i> Rejoindre
    </button>
    <div id="lobby-error"></div>
  </div>
</div>

<!-- CHAT -->
<div id="screen-chat">
  <div class="chat-header">
    <div class="logo-icon" style="width:36px;height:36px;font-size:1rem;border-radius:9px;flex-shrink:0">&#127919;</div>
    <div style="flex:1;min-width:0">
      <div class="room-name" id="chat-room-name">--</div>
      <div class="room-meta">
        <div class="odot"></div>
        <span id="member-count">0 connecte</span>
        <span id="room-code-disp" style="font-family:DM Mono,monospace;opacity:.6"></span>
      </div>
    </div>
    <a href="#" id="ad-link" class="ad-link" style="display:none" target="_blank" rel="noopener">
      <i class="fas fa-external-link-alt"></i> Lobby
    </a>
    <button class="btn btn-icon" onclick="openShare()" title="Partager"><i class="fas fa-share-alt"></i></button>
    <button class="btn btn-icon" onclick="leaveRoom()" style="color:var(--red)" title="Quitter"><i class="fas fa-right-from-bracket"></i></button>
  </div>

  <div class="chat-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sb-section">Participants</div>
      <div class="member-list" id="member-list"></div>
      <div class="sb-share">
        <div class="section-lbl" style="margin-bottom:.45rem">Partager</div>
        <div class="qr-wrap" id="qr-sidebar"></div>
        <div class="link-row">
          <input class="link-input" id="share-link" readonly>
          <button class="btn btn-icon" onclick="copyLink()" title="Copier"><i class="fas fa-copy"></i></button>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div class="chat-main">
      <div class="msgs" id="msgs"></div>
      <div class="quick-bar">
        <button class="qbtn gold" onclick="sendQuick('180','💯 180 !')">&#128175; 180 !</button>
        <button class="qbtn grn" onclick="sendQuick('win','🏆 Game shot !')">&#127942; Game shot</button>
        <button class="qbtn red" onclick="sendQuick('bust','💥 Bust !')">&#128165; Bust</button>
        <button class="qbtn" onclick="sendQuick('chat','👍 GG !')">&#128077; GG</button>
        <button class="qbtn" onclick="sendQuick('chat','🎯 On joue ?')">&#127919; On joue ?</button>
      </div>
      <div class="chat-input-bar">
        <input class="chat-field" id="chat-input" placeholder="Ecrire un message..." maxlength="300"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}">
        <button class="btn-send" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>
</div>

<!-- MODAL PARTAGE -->
<div class="modal-bg" id="share-modal">
  <div class="modal-box">
    <div class="modal-title">Partager le salon</div>
    <div class="modal-sub">Invitez vos amis via le lien ou le code</div>
    <div style="background:#fff;border-radius:12px;padding:12px;display:flex;justify-content:center;margin-bottom:.9rem">
      <div id="qr-modal"></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:.9rem">
      <input class="link-input" id="share-modal-link" readonly style="flex:1;min-width:0">
      <button class="btn btn-icon" onclick="copyLink()"><i class="fas fa-copy"></i></button>
    </div>
    <div style="text-align:center;margin-bottom:.8rem">
      <div style="font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Code du salon</div>
      <div class="code-display" id="modal-code"></div>
    </div>
    <button class="btn btn-secondary" onclick="closeShare()">Fermer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FB = {
  apiKey:"AIzaSyChT6xEFly_hzbqX3FULLL5yqV4Ij3mwcY",
  authDomain:"darts-club-77ce6.firebaseapp.com",
  projectId:"darts-club-77ce6",
  storageBucket:"darts-club-77ce6.firebasestorage.app",
  messagingSenderId:"371102071387",
  appId:"1:371102071387:web:eb1adc3cd0be37a866dd7e"
};
let db,roomId,myPseudo,myColor,unsubMsgs,unsubMembers,qrDone=false;
const COLORS=["#e63946","#457bf7","#34d47b","#f5c518","#a67cf7","#ff6b74","#2dc6c6"];

firebase.initializeApp(FB);
db=firebase.firestore();

window.addEventListener("load",()=>{
  const p=new URLSearchParams(location.search);
  const rc=p.get("room");
  if(rc) document.getElementById("join-code").value=rc.toUpperCase();
  const sp=localStorage.getItem("darts_chat_pseudo")||"";
  if(sp){document.getElementById("create-pseudo").value=sp;document.getElementById("join-pseudo").value=sp;}
});

function genCode(){
  const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join("");
}
function colorFor(s){
  let h=0;for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);
  return COLORS[Math.abs(h)%COLORS.length];
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function ts(){return firebase.firestore.FieldValue.serverTimestamp();}

async function createRoom(){
  const name=document.getElementById("room-name").value.trim()||"Salon Darts";
  const pseudo=document.getElementById("create-pseudo").value.trim();
  const adUrl=document.getElementById("autodarts-url").value.trim();
  if(!pseudo){showErr("Entrez votre pseudo.");return;}
  myPseudo=pseudo;myColor=colorFor(pseudo);
  localStorage.setItem("darts_chat_pseudo",pseudo);
  const code=genCode();
  try{
    await db.collection("chat_rooms").doc(code).set({name,code,autodarts:adUrl||null,created:new Date().toISOString(),createdBy:pseudo});
    await enterRoom(code);
  }catch(e){showErr("Erreur : "+e.message);}
}

async function joinRoom(){
  const code=document.getElementById("join-code").value.trim().toUpperCase();
  const pseudo=document.getElementById("join-pseudo").value.trim();
  if(!code||code.length<4){showErr("Code invalide.");return;}
  if(!pseudo){showErr("Entrez votre pseudo.");return;}
  myPseudo=pseudo;myColor=colorFor(pseudo);
  localStorage.setItem("darts_chat_pseudo",pseudo);
  await enterRoom(code);
}

async function enterRoom(code){
  try{
    const snap=await db.collection("chat_rooms").doc(code).get();
    if(!snap.exists){showErr("Salon "" + code + "" introuvable.");return;}
    const room=snap.data();
    roomId=code;
    await db.collection("chat_rooms").doc(code).collection("members").doc(myPseudo).set({pseudo:myPseudo,color:myColor,active:true,joinedAt:ts()});
    await postSys(myPseudo+" a rejoint le salon &#127919;");
    initChatUI(room);
    subMsgs(code);subMembers(code);
    const u=new URL(location.href);u.searchParams.set("room",code);history.replaceState({},"",u.toString());
  }catch(e){showErr("Erreur : "+e.message);}
}

function initChatUI(room){
  document.getElementById("screen-lobby").style.display="none";
  document.getElementById("screen-chat").style.display="flex";
  document.getElementById("chat-room-name").textContent=room.name;
  document.getElementById("room-code-disp").textContent="#"+room.code;
  if(room.autodarts){const l=document.getElementById("ad-link");l.href=room.autodarts;l.style.display="flex";}
  const url=location.origin+location.pathname+"?room="+room.code;
  ["share-link","share-modal-link"].forEach(id=>document.getElementById(id).value=url);
  document.getElementById("modal-code").textContent=room.code;
  if(!qrDone){
    qrDone=true;
    ["qr-sidebar","qr-modal"].forEach((id,i)=>{
      document.getElementById(id).innerHTML="";
      try{new QRCode(document.getElementById(id),{text:url,width:i?180:138,height:i?180:138,colorDark:"#000",colorLight:"#fff",correctLevel:QRCode.CorrectLevel.M});}catch(e){}
    });
  }
}

async function sendMsg(){
  const inp=document.getElementById("chat-input");
  const text=inp.value.trim();if(!text||!roomId)return;
  inp.value="";
  await db.collection("chat_rooms").doc(roomId).collection("messages").add({type:"chat",pseudo:myPseudo,color:myColor,text,ts:ts()});
}
async function sendQuick(type,text){
  if(!roomId)return;
  const t=type==="180"?"e180":type==="win"?"ewin":type==="bust"?"ebust":"chat";
  await db.collection("chat_rooms").doc(roomId).collection("messages").add({type:t,pseudo:myPseudo,color:myColor,text,ts:ts()});
}
async function postSys(text){
  if(!roomId)return;
  await db.collection("chat_rooms").doc(roomId).collection("messages").add({type:"sys",text,ts:ts()});
}

function subMsgs(code){
  if(unsubMsgs)unsubMsgs();
  unsubMsgs=db.collection("chat_rooms").doc(code).collection("messages")
    .orderBy("ts","asc").limitToLast(100)
    .onSnapshot(snap=>{
      const wrap=document.getElementById("msgs");
      wrap.innerHTML="";
      snap.forEach(d=>renderMsg(d.data(),wrap));
      wrap.scrollTop=wrap.scrollHeight;
    });
}
function renderMsg(m,wrap){
  const time=m.ts&&m.ts.toDate?m.ts.toDate().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}):"" ;
  if(m.type==="sys"){
    const el=document.createElement("div");el.className="msg-sys";el.innerHTML=m.text;wrap.appendChild(el);return;
  }
  if(["e180","ebust","ewin","egame"].includes(m.type)){
    const cls=m.type;
    const el=document.createElement("div");el.className="msg-event";
    el.innerHTML="<div class="event-badge "+cls+""><strong>"+esc(m.pseudo)+"</strong> &mdash; "+esc(m.text)+"<span style="font-size:.58rem;opacity:.6;margin-left:5px">"+time+"</span></div>";
    wrap.appendChild(el);return;
  }
  const mine=m.pseudo===myPseudo;
  const ini=(m.pseudo||"?").slice(0,2).toUpperCase();
  const col=m.color||colorFor(m.pseudo||"?");
  const g=document.createElement("div");g.className="msg-group"+(mine?" mine":"");
  g.innerHTML="<div class="mavt" style="background:"+col+"20;color:"+col+";border:1px solid "+col+"40">"+ini+"</div>"+
    "<div class="msg-content">"+(!mine?"<div class="msg-nick" style="color:"+col+"">"+esc(m.pseudo)+"</div>":"")+
    "<div class="bubble">"+esc(m.text)+"</div>"+
    "<div class="msg-time">"+time+"</div></div>";
  wrap.appendChild(g);
}

function subMembers(code){
  if(unsubMembers)unsubMembers();
  unsubMembers=db.collection("chat_rooms").doc(code).collection("members")
    .where("active","==",true)
    .onSnapshot(snap=>{
      const list=document.getElementById("member-list");list.innerHTML="";let n=0;
      snap.forEach(d=>{
        const m=d.data();n++;
        const ini=(m.pseudo||"?").slice(0,2).toUpperCase();
        const isMe=m.pseudo===myPseudo;
        const el=document.createElement("div");el.className="member-item";
        el.innerHTML="<div class="mavatar" style="background:"+m.color+"20;color:"+m.color+";border:1px solid "+m.color+"40">"+ini+"</div>"+
          "<div class="mname">"+esc(m.pseudo)+"</div>"+(isMe?"<div class="myou">vous</div>":"");
        list.appendChild(el);
      });
      document.getElementById("member-count").textContent=n+" connect"+(n>1?"es":"e");
    });
}

async function leaveRoom(){
  if(!confirm("Quitter ce salon ?"))return;
  if(unsubMsgs)unsubMsgs();if(unsubMembers)unsubMembers();
  if(roomId&&myPseudo){
    await db.collection("chat_rooms").doc(roomId).collection("members").doc(myPseudo).update({active:false});
    await postSys(myPseudo+" a quitte le salon.");
  }
  roomId=null;qrDone=false;
  document.getElementById("screen-chat").style.display="none";
  document.getElementById("screen-lobby").style.display="flex";
  document.getElementById("msgs").innerHTML="";
  const u=new URL(location.href);u.searchParams.delete("room");history.replaceState({},"",u.toString());
}

function openShare(){document.getElementById("share-modal").classList.add("open");}
function closeShare(){document.getElementById("share-modal").classList.remove("open");}
function copyLink(){
  navigator.clipboard.writeText(document.getElementById("share-link").value).then(()=>toast("Lien copie !"));
}
function showErr(msg){const el=document.getElementById("lobby-error");el.style.display="block";el.textContent=msg;setTimeout(()=>el.style.display="none",4000);}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
document.getElementById("share-modal").addEventListener("click",function(e){if(e.target===this)closeShare();});
</script>
